<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SayHi Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #chatbox { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: auto; }
        #userInput { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>SayHi Chatbot</h1>
    <div id="chatbox"></div>
    <div id="userInput">
        <input type="text" id="userMessage" placeholder="Type your message here..." />
        <button onclick="sendMessage()">Send</button>
    </div>
    <script>
        function appendMessage(who, message) {
            const chatbox = document.getElementById('chatbox');
            chatbox.innerHTML += `<p><strong>${who}:</strong> ${message}</p>`;
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('userMessage');
            const userMessage = input.value;
            appendMessage('You', userMessage);
            input.value = '';

            // Here, you would normally call your chatbot API and handle the response
            const botResponse = 'This is a response from the SayHi chatbot.'; // Placeholder response
            appendMessage('SayHi', botResponse);
        }
    </script>
</body>
</html>
